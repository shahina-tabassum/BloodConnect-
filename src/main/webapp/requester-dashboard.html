<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requester Dashboard — BloodConnect</title>
    <meta name="description" content="View and manage your blood requests on BloodConnect.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        blood: {
                            50: '#fef2f2', 100: '#fee2e2', 200: '#fecaca',
                            300: '#fca5a5', 400: '#f87171', 500: '#ef4444',
                            600: '#dc2626', 700: '#b91c1c', 800: '#991b1b',
                            900: '#7f1d1d', 950: '#450a0a'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-pulse-slow { animation: pulse-slow 3s ease-in-out infinite; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-glow:focus { box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.3); }
    </style>
</head>
<body class="font-sans bg-gray-950 text-white min-h-screen relative overflow-x-hidden">

    <!-- Background decorations -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-10 left-10 w-96 h-96 bg-blood-600/10 rounded-full blur-3xl animate-pulse-slow"></div>
        <div class="absolute bottom-10 right-10 w-96 h-96 bg-blood-800/10 rounded-full blur-3xl animate-pulse-slow" style="animation-delay: 1.5s;"></div>
    </div>

    <!-- Header / Navbar -->
    <nav class="relative z-10 glass border-b border-white/10 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blood-500 to-blood-700 rounded-xl flex items-center justify-center shadow-lg shadow-blood-500/20">
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
            <div>
                <span class="font-bold text-lg tracking-wide bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">BloodConnect</span>
                <span class="text-[10px] text-blood-400 font-semibold uppercase tracking-wider block leading-none">Requester Portal</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden sm:flex flex-col text-right">
                <span class="text-sm font-semibold text-gray-200" id="user-display-name">Loading...</span>
                <span class="text-xs text-blood-400 font-medium">Requester</span>
            </div>
            <button id="logout-btn"
               class="px-4 py-2 bg-white/5 border border-white/10 hover:bg-blood-600/10 hover:border-blood-500/50 rounded-xl text-xs font-semibold tracking-wide transition-all duration-200">
                Sign Out
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 max-w-7xl mx-auto px-4 py-8 md:py-12">

        <!-- Flash messages -->
        <div id="flash-container"></div>

        <!-- Page Title & CTA Row -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div>
                <h2 class="text-2xl font-bold bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">Your Blood Requests</h2>
                <p class="text-gray-400 text-xs mt-1">Create and manage your active requests to match compatible donors.</p>
            </div>
            <a href="request-form.html" id="new-request-btn"
               class="inline-flex items-center gap-2 px-5 py-3 bg-gradient-to-r from-blood-600 to-blood-700 hover:from-blood-500 hover:to-blood-600 text-white font-semibold rounded-xl shadow-lg shadow-blood-600/30 hover:shadow-blood-500/40 transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] text-sm self-start sm:self-auto">
                <span>➕</span> Request Blood
            </a>
        </div>

        <!-- Request Listing Panels -->
        <div id="requests-container">
            <span class="text-xs text-gray-500">Loading blood requests...</span>
        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 glass border-t border-white/5 py-8 mt-16 text-center text-gray-500 text-xs">
        <p>&copy; 2026 BloodConnect. All rights reserved.</p>
        <p class="mt-1 text-gray-600">Saving lives, one match at a time.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userDisplayName = document.getElementById('user-display-name');
            const flashContainer = document.getElementById('flash-container');
            const requestsContainer = document.getElementById('requests-container');

            function showFlashMessage(message, isError = false) {
                const bgClass = isError ? 'bg-red-500/10 border-red-500/30 text-red-300' : 'bg-emerald-500/10 border-emerald-500/30 text-emerald-300';
                const typeIcon = isError ? '⚠' : '✓';
                flashContainer.innerHTML = `
                    <div class="${bgClass} border px-5 py-4 rounded-2xl mb-8 flex items-center justify-between text-sm shadow-xl" id="alert-box">
                        <div class="flex items-center gap-3">
                            <span class="text-xl">${typeIcon}</span>
                            <span>${message}</span>
                        </div>
                        <button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-white transition-colors">✕</button>
                    </div>
                `;
            }

            // Verify session and load requests
            fetch('login')
                .then(res => res.json())
                .then(sessionData => {
                    if (sessionData.success && sessionData.role === 'REQUESTER') {
                        userDisplayName.textContent = sessionData.userName;
                        loadRequests();
                    } else {
                        window.location.href = 'login.html';
                    }
                })
                .catch(err => {
                    console.error('Session verify error:', err);
                    window.location.href = 'login.html';
                });

            function loadRequests() {
                fetch('request/list')
                    .then(res => {
                        if (res.status === 401) {
                            window.location.href = 'login.html';
                            return;
                        }
                        return res.json();
                    })
                    .then(data => {
                        if (!data) return;

                        if (data.success) {
                            if (!data.requests || data.requests.length === 0) {
                                requestsContainer.innerHTML = `
                                    <div class="glass rounded-2xl p-12 text-center shadow-2xl border border-white/10">
                                        <div class="text-5xl mb-4">🏥</div>
                                        <h3 class="text-lg font-bold text-gray-300">No Blood Requests Yet</h3>
                                        <p class="text-gray-500 text-sm mt-2 max-w-md mx-auto">
                                            Need urgent blood supply? Post a request specifying patient name, blood group, hospital location, and urgency.
                                        </p>
                                        <a href="request-form.html" id="cta-new-request-btn"
                                           class="inline-block mt-6 px-6 py-2.5 bg-blood-600 hover:bg-blood-500 text-white text-xs font-semibold rounded-xl tracking-wide transition-all duration-200">
                                            Create Your First Request
                                        </a>
                                    </div>
                                `;
                            } else {
                                let gridHtml = '<div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="requests-grid">';
                                data.requests.forEach(req => {
                                    let urgencyBadge = '';
                                    if (req.urgency === 'CRITICAL') {
                                        urgencyBadge = '<span class="text-[9px] font-extrabold uppercase tracking-wider px-2 py-0.5 rounded bg-red-500/20 text-red-400 border border-red-500/30 animate-pulse">Critical</span>';
                                    } else if (req.urgency === 'HIGH') {
                                        urgencyBadge = '<span class="text-[9px] font-extrabold uppercase tracking-wider px-2 py-0.5 rounded bg-orange-500/20 text-orange-400 border border-orange-500/30">High</span>';
                                    } else if (req.urgency === 'MEDIUM') {
                                        urgencyBadge = '<span class="text-[9px] font-extrabold uppercase tracking-wider px-2 py-0.5 rounded bg-yellow-500/20 text-yellow-400 border border-yellow-500/30">Medium</span>';
                                    } else {
                                        urgencyBadge = '<span class="text-[9px] font-extrabold uppercase tracking-wider px-2 py-0.5 rounded bg-blue-500/20 text-blue-400 border border-blue-500/30">Low</span>';
                                    }

                                    let verifyBadge = '';
                                    if (req.isVerified) {
                                        verifyBadge = `
                                            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 text-[10px] font-semibold" id="verify-badge-${req.requestId}">
                                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> Verified Contact Reveal
                                            </span>
                                        `;
                                    } else {
                                        verifyBadge = `
                                            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-amber-500/10 text-amber-400 border border-amber-500/30 text-[10px] font-semibold" id="verify-badge-${req.requestId}">
                                                <span class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></span> Awaiting Verification
                                            </span>
                                        `;
                                    }

                                    let statusBadge = '';
                                    if (req.status === 'OPEN') {
                                        statusBadge = '<span class="px-2.5 py-1 rounded-lg bg-blue-500/10 text-blue-400 border border-blue-500/30 text-[10px] font-semibold">Open</span>';
                                    } else if (req.status === 'MATCHED') {
                                        statusBadge = '<span class="px-2.5 py-1 rounded-lg bg-indigo-500/10 text-indigo-400 border border-indigo-500/30 text-[10px] font-semibold">Matched</span>';
                                    } else if (req.status === 'FULFILLED') {
                                        statusBadge = '<span class="px-2.5 py-1 rounded-lg bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 text-[10px] font-semibold">Fulfilled</span>';
                                    } else {
                                        statusBadge = '<span class="px-2.5 py-1 rounded-lg bg-gray-500/10 text-gray-400 border border-gray-500/30 text-[10px] font-semibold">Closed</span>';
                                    }

                                    let actionHtml = '';
                                    if (req.matchCount > 0) {
                                        actionHtml = `
                                            <a href="match-results.html?requestId=${req.requestId}" 
                                               id="view-matches-${req.requestId}"
                                               class="px-4 py-2 bg-gradient-to-r from-blood-600 to-blood-700 hover:from-blood-500 hover:to-blood-600 text-white font-semibold rounded-xl text-xs transition-all duration-200">
                                                View matches (${req.matchCount})
                                            </a>
                                        `;
                                    } else {
                                        actionHtml = '<span class="text-gray-500 italic">No matches found yet</span>';
                                    }

                                    gridHtml += `
                                        <div class="glass rounded-2xl p-6 shadow-xl border border-white/5 hover:border-white/10 hover:shadow-2xl transition-all duration-300 flex flex-col justify-between">
                                            <div class="space-y-4">
                                                <div class="flex items-center justify-between gap-3">
                                                    <h3 class="font-bold text-base text-gray-100" id="patient-name-${req.requestId}">
                                                        Patient: ${req.patientName}
                                                    </h3>
                                                    ${urgencyBadge}
                                                </div>

                                                <div class="grid grid-cols-2 gap-x-4 gap-y-2.5 py-3 border-y border-white/5 text-xs">
                                                    <div>
                                                        <span class="text-gray-500 block text-[10px] uppercase font-semibold">Blood Group Needed</span>
                                                        <span class="font-bold text-white text-sm">${req.bloodGroupNeeded}</span>
                                                    </div>
                                                    <div>
                                                        <span class="text-gray-500 block text-[10px] uppercase font-semibold">Units Required</span>
                                                        <span class="font-bold text-white text-sm">${req.unitsRequired} Unit(s)</span>
                                                    </div>
                                                    <div class="col-span-2">
                                                        <span class="text-gray-500 block text-[10px] uppercase font-semibold">Hospital & City</span>
                                                        <span class="font-medium text-gray-200">${req.hospitalName}, ${req.city}</span>
                                                    </div>
                                                </div>

                                                <div class="flex flex-wrap items-center gap-2 pt-1 text-xs">
                                                    ${verifyBadge}
                                                    ${statusBadge}
                                                </div>
                                            </div>

                                            <div class="mt-6 pt-4 border-t border-white/5 flex items-center justify-between text-xs">
                                                <span class="text-gray-500">Created: ${req.createdAt}</span>
                                                ${actionHtml}
                                            </div>
                                        </div>
                                    `;
                                });
                                gridHtml += '</div>';
                                requestsContainer.innerHTML = gridHtml;
                            }
                        } else {
                            showFlashMessage(data.message || 'Error loading blood requests.', true);
                        }
                    })
                    .catch(err => {
                        console.error('Error fetching list:', err);
                        showFlashMessage('Failed to fetch requests.', true);
                    });
            }

            // Logout click
            document.getElementById('logout-btn').addEventListener('click', () => {
                fetch('logout', { method: 'POST' })
                    .then(res => res.json())
                    .then(() => {
                        window.location.href = 'index.html';
                    })
                    .catch(err => {
                        window.location.href = 'index.html';
                    });
            });
        });
    </script>
</body>
</html>
